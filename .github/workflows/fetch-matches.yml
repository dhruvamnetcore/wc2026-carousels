name: Matchday pipeline

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min — GitHub honors this more reliably than sub-hourly schedules
  workflow_dispatch:        # manual "Run workflow" button for testing
    inputs:
      refetch:
        description: "Re-fetch existing matches (overwrite with fresh data)"
        type: boolean
        default: false
      backfill_days:
        description: "How many days back to scan (default 1)"
        default: "1"
      dump_fifa:
        description: "Probe FIFA's per-player stats endpoints and log what they return (debug)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: matchday
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: 1. Fetch finished matches
        run: node fetch-match.mjs
        env:
          # API-Football: the fetcher accepts either spelling, both are passed
          APIFOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          # Highlightly: this was MISSING before — the stats source never had its key
          HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
          # one-time backfill controls (from the Run-workflow button)
          REFETCH: ${{ github.event.inputs.refetch == 'true' && '1' || '' }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '1' }}
          DUMP_FIFA: ${{ github.event.inputs.dump_fifa == 'true' && '1' || '' }}

      - name: 2. Install renderer (Puppeteer)
        run: npm install

      - name: 3. Render slides to PNG
        run: node render-slides.mjs

      - name: 4. Commit match data + rendered slides
        run: |
          git config user.name "matchday-bot"
          git config user.email "matchday-bot@users.noreply.github.com"
          mkdir -p matches posts   # ensure the paths exist on "nothing new" runs
          git add matches/ posts/ NEEDS_REVIEW.md
          git diff --staged --quiet || (git commit -m "match data + slides $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)

      - name: 5. Auto-post to Instagram (skipped when autoPost is false)
        run: node post-instagram.mjs
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}

      - name: 6. Commit posted markers
        run: |
          git config user.name "matchday-bot"
          git config user.email "matchday-bot@users.noreply.github.com"
          mkdir -p posts   # ensure the path exists on "nothing new" runs
          git add posts/
          git diff --staged --quiet || (git commit -m "posted markers $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
